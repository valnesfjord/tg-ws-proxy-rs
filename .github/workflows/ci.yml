name: CI

on:
  push:
    branches:
      - main
      - master
      - feature/**
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clippy
        run: cargo clippy --all-targets --locked

      - name: Test
        run: cargo test --locked

      - name: Release build
        run: cargo build --release --locked
